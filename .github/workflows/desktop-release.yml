name: Desktop Release (Signed Updater)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: desktop-v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "prerelease=${{ inputs.prerelease }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            "tag=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build signed desktop artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun --cwd packages/desktop tauri build --config src-tauri/tauri.beta.conf.json

      - name: Verify updater manifest exists
        shell: pwsh
        run: |
          $latest = Get-ChildItem -Path "packages/desktop/src-tauri/target/release/bundle" -Recurse -Filter "latest.json" -ErrorAction SilentlyContinue
          if (-not $latest) {
            Write-Error "latest.json not found. Updater release cannot be published."
            exit 1
          }
          Write-Host "Found updater manifest(s):"
          $latest | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            packages/desktop/src-tauri/target/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/release/bundle/**/*.msi
            packages/desktop/src-tauri/target/release/bundle/**/*.sig
            packages/desktop/src-tauri/target/release/bundle/**/latest.json
