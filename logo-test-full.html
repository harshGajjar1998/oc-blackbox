<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACKBOX AI — Full UI Logo Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; }

  /* CSS variables matching the app's dark theme */
  :root {
    --background-base: #111111;
    --background-weak: #1a1a1a;
    --surface-weak: #222222;
    --icon-strong-base: #FBFBFB;
    --icon-base: #888888;
    --icon-warning-base: #F59E0B;
    --text-strong: #F5F5F5;
    --text-weak: #888888;
    --border-weak-base: #2a2a2a;
  }

  .light-theme {
    --background-base: #F5F5F5;
    --background-weak: #EBEBEB;
    --surface-weak: #E0E0E0;
    --icon-strong-base: #0D0D0D;
    --icon-base: #555555;
    --icon-warning-base: #D97706;
    --text-strong: #111111;
    --text-weak: #555555;
    --border-weak-base: #CCCCCC;
  }

  /* Section labels */
  .label {
    color: #555;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 20px 8px;
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
  }

  /* ===== LOADING SCREEN SIMULATION ===== */
  .loading-screen {
    background: var(--background-base);
    width: 100%;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loading-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 44px;
  }

  .splash-icon {
    opacity: 0.15;
  }

  .loading-text-area {
    width: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .loading-status {
    color: var(--text-strong);
    font-size: 14px;
    text-align: center;
  }

  .progress-track {
    width: 80px;
    height: 4px;
    background: var(--surface-weak);
    border-radius: 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 45%;
    background: var(--icon-warning-base);
    border-radius: 0;
  }

  /* ===== HOME PAGE SIMULATION ===== */
  .home-screen {
    background: var(--background-base);
    width: 100%;
    height: 500px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 55px;
  }

  .home-content {
    width: 100%;
    max-width: 480px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .home-logo {
    opacity: 0.12;
    width: 100%;
    max-width: 480px;
  }

  .server-btn {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-weak);
    font-size: 14px;
    align-self: center;
  }

  .server-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22C55E;
  }

  .recent-projects {
    margin-top: 80px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .recent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 12px;
  }

  .recent-title {
    color: var(--text-strong);
    font-size: 14px;
    font-weight: 500;
  }

  .project-item {
    padding: 12px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-strong);
    font-size: 13px;
    font-family: monospace;
    text-align: left;
    display: flex;
    justify-content: space-between;
    border-radius: 6px;
  }

  .project-item:hover { background: var(--surface-weak); }

  .project-time {
    color: var(--text-weak);
    font-size: 13px;
    font-family: -apple-system, sans-serif;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #1a1a1a;
  }
</style>
</head>
